<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS Apple Account Settings - Icon Replica</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: #000000;
            color: #fff;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 414px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            padding: 20px 0;
            font-size: 17px;
            font-weight: 600;
            color: #fff;
        }

        .section {
            background: #1C1C1E;
            border-radius: 12px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .row {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #38383A;
            cursor: pointer;
            transition: background 0.2s;
        }

        .row:last-child {
            border-bottom: none;
        }

        .row:active {
            background: #2C2C2E;
        }

        .icon-wrapper {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        .icon-wrapper.gray {
            background: linear-gradient(135deg, #9E9E9E, #757575);
        }

        .icon-wrapper.white {
            background: #fff;
        }

        .icon-wrapper.green {
            background: linear-gradient(135deg, #34C759, #30D158);
        }

        .icon-wrapper.blue {
            background: linear-gradient(135deg, #007AFF, #5AC8FA);
        }

        .icon-wrapper.device {
            background: linear-gradient(135deg, #FF6B9D, #4ECDC4, #45B7D1);
            border-radius: 6px;
        }

        .icon-wrapper.windows {
            background: #fff;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 1px;
            padding: 4px;
        }

        .windows-square {
            width: 100%;
            height: 100%;
        }

        .ws-red { background: #F25022; }
        .ws-green { background: #7FBA00; }
        .ws-blue { background: #00A4EF; }
        .ws-yellow { background: #FFB900; }

        /* SVG Icons */
        .icon-svg {
            width: 20px;
            height: 20px;
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .label {
            font-size: 16px;
            color: #fff;
            font-weight: 400;
        }

        .subtitle {
            font-size: 13px;
            color: #8E8E93;
            margin-top: 2px;
        }

        .chevron {
            color: #636366;
            font-size: 14px;
            margin-left: 8px;
        }

        .detail {
            font-size: 16px;
            color: #8E8E93;
            margin-right: 8px;
        }

        .right-section {
            display: flex;
            align-items: center;
        }

        /* Special icon styles */
        .person-icon {
            width: 18px;
            height: 18px;
        }

        .icloud-icon {
            width: 22px;
            height: 22px;
        }

        .family-icon {
            width: 22px;
            height: 22px;
        }

        .findmy-icon {
            width: 20px;
            height: 20px;
        }

        .appstore-icon {
            width: 20px;
            height: 20px;
        }

        .apple-icon {
            width: 18px;
            height: 18px;
        }

        .device-frame {
            width: 18px;
            height: 24px;
            background: #000;
            border-radius: 3px;
            position: relative;
            overflow: hidden;
        }

        .device-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 3px;
            background: #000;
            border-radius: 0 0 2px 2px;
            z-index: 2;
        }

        .device-screen {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #FF6B9D, #4ECDC4, #45B7D1);
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">Apple 账户</div>

        <!-- Section 1: Account Management -->
        <div class="section">
            <!-- 个人信息 -->
            <div class="row">
                <div class="icon-wrapper gray">
                    <svg class="icon-svg person-icon" viewBox="0 0 24 24" fill="none">
                        <rect x="4" y="8" width="16" height="12" rx="2" stroke="white" stroke-width="1.5" fill="none"/>
                        <circle cx="12" cy="5" r="3" stroke="white" stroke-width="1.5" fill="none"/>
                        <path d="M8 12h8M8 15h6" stroke="white" stroke-width="1" opacity="0.6"/>
                    </svg>
                </div>
                <div class="content">
                    <div class="label">个人信息</div>
                </div>
                <div class="chevron">›</div>
            </div>

            <!-- 登录与安全性 -->
            <div class="row">
                <div class="icon-wrapper gray">
                    <svg class="icon-svg" viewBox="0 0 24 24" fill="none">
                        <path d="M12 3C9.5 3 7.5 4.5 7.5 6.5V9H5.5C4.67 9 4 9.67 4 10.5V19.5C4 20.33 4.67 21 5.5 21H18.5C19.33 21 20 20.33 20 19.5V10.5C20 9.67 19.33 9 18.5 9H16.5V6.5C16.5 4.5 14.5 3 12 3Z" stroke="white" stroke-width="1.5" fill="none"/>
                        <circle cx="12" cy="15" r="1.5" fill="white"/>
                        <path d="M12 15V17" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </div>
                <div class="content">
                    <div class="label">登录与安全性</div>
                </div>
                <div class="chevron">›</div>
            </div>

            <!-- 付款与配送 -->
            <div class="row">
                <div class="icon-wrapper gray">
                    <svg class="icon-svg" viewBox="0 0 24 24" fill="none">
                        <rect x="3" y="6" width="18" height="12" rx="2" stroke="white" stroke-width="1.5" fill="none"/>
                        <line x1="3" y1="10" x2="21" y2="10" stroke="white" stroke-width="1.5"/>
                        <line x1="6" y1="14" x2="12" y2="14" stroke="white" stroke-width="1" opacity="0.6"/>
                    </svg>
                </div>
                <div class="content">
                    <div class="label">付款与配送</div>
                </div>
                <div class="chevron">›</div>
            </div>

            <!-- 订阅 -->
            <div class="row">
                <div class="icon-wrapper gray">
                    <svg class="icon-svg" viewBox="0 0 24 24" fill="none">
                        <path d="M12 4C7.5 4 4 7.5 4 12s3.5 8 8 8 8-3.5 8-8" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
                        <path d="M12 4v4l3-2" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="12" cy="12" r="1.5" fill="white"/>
                    </svg>
                </div>
                <div class="content">
                    <div class="label">订阅</div>
                    <div class="subtitle">ustczhijian@gmail.com</div>
                </div>
                <div class="chevron">›</div>
            </div>
        </div>

        <!-- Section 2: Apple Services -->
        <div class="section">
            <!-- iCloud -->
            <div class="row">
                <div class="icon-wrapper white">
                    <svg class="icloud-icon" viewBox="0 0 24 24" fill="none">
                        <defs>
                            <linearGradient id="icloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#5AC8FA"/>
                                <stop offset="100%" style="stop-color:#007AFF"/>
                            </linearGradient>
                        </defs>
                        <path d="M18.5 10.5c0-2.5-2-4.5-4.5-4.5-1.5 0-2.8.7-3.6 1.8C10 7.2 9.5 7 9 7c-2.2 0-4 1.8-4 4 0 .3 0 .5.1.8C3.4 12.5 2 14.3 2 16.5 2 19.5 4.5 22 7.5 22h11c2.8 0 5-2.2 5-5 0-2.5-1.8-4.6-4.2-4.9.4-.4.7-1 .7-1.6z" fill="url(#icloudGrad)"/>
                    </svg>
                </div>
                <div class="content">
                    <div class="label">iCloud</div>
                </div>
                <div class="right-section">
                    <div class="detail">5 GB</div>
                    <div class="chevron">›</div>
                </div>
            </div>

            <!-- 家人共享 -->
            <div class="row">
                <div class="icon-wrapper white">
                    <svg class="family-icon" viewBox="0 0 24 24" fill="none">
                        <defs>
                            <linearGradient id="familyGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#34C759"/>
                                <stop offset="100%" style="stop-color:#30D158"/>
                            </linearGradient>
                            <linearGradient id="familyGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#5AC8FA"/>
                                <stop offset="100%" style="stop-color:#007AFF"/>
                            </linearGradient>
                            <linearGradient id="familyGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#AF52DE"/>
                                <stop offset="100%" style="stop-color:#5856D6"/>
                            </linearGradient>
                        </defs>
                        <!-- Person 1 (back left) -->
                        <circle cx="7" cy="8" r="2.5" fill="url(#familyGrad2)" opacity="0.8"/>
                        <path d="M4 16c0-2 1.5-3.5 3.5-3.5S11 14 11 16" stroke="url(#familyGrad2)" stroke-width="1.5" fill="none" opacity="0.8"/>
                        <!-- Person 2 (back right) -->
                        <circle cx="17" cy="8" r="2.5" fill="url(#familyGrad3)" opacity="0.8"/>
                        <path d="M14 16c0-2 1.5-3.5 3.5-3.5S21 14 21 16" stroke="url(#familyGrad3)" stroke-width="1.5" fill="none" opacity="0.8"/>
                        <!-- Person 3 (front center) -->
                        <circle cx="12" cy="7" r="3" fill="url(#familyGrad1)"/>
                        <path d="M8 17c0-2.5 2-4.5 4-4.5s4 2 4 4.5" stroke="url(#familyGrad1)" stroke-width="1.5" fill="none"/>
                    </svg>
                </div>
                <div class="content">
                    <div class="label">家人共享</div>
                </div>
                <div class="right-section">
                    <div class="detail">设置</div>
                    <div class="chevron">›</div>
                </div>
            </div>

            <!-- 查找 -->
            <div class="row">
                <div class="icon-wrapper green">
                    <svg class="findmy-icon" viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="12" r="2.5" fill="white"/>
                        <circle cx="12" cy="12" r="5" stroke="white" stroke-width="1" fill="none" opacity="0.6"/>
                        <circle cx="12" cy="12" r="8" stroke="white" stroke-width="0.8" fill="none" opacity="0.3"/>
                        <path d="M12 2v2M12 20v2M2 12h2M20 12h2" stroke="white" stroke-width="0.8" opacity="0.4"/>
                    </svg>
                </div>
                <div class="content">
                    <div class="label">查找</div>
                </div>
                <div class="chevron">›</div>
            </div>

            <!-- 媒体与购买项目 -->
            <div class="row">
                <div class="icon-wrapper blue">
                    <svg class="appstore-icon" viewBox="0 0 24 24" fill="none">
                        <path d="M12 4L7 15h10L12 4z" fill="white"/>
                        <path d="M6 15l-2 3h16l-2-3" fill="white" opacity="0.9"/>
                        <path d="M9 11l-3 4h6" fill="white" opacity="0.7"/>
                        <line x1="10" y1="8" x2="14" y2="8" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
                    </svg>
                </div>
                <div class="content">
                    <div class="label">媒体与购买项目</div>
                    <div class="subtitle">ustczhijian@gmail.com</div>
                </div>
                <div class="chevron">›</div>
            </div>

            <!-- 通过 Apple 登录 -->
            <div class="row">
                <div class="icon-wrapper white">
                    <svg class="apple-icon" viewBox="0 0 24 24" fill="black">
                        <path d="M18.7 8.8c-.1-1.8 1.5-3.4 1.5-3.4s-1.8-2.3-4.3-2.3c-2 0-3.7 1.2-4.5 1.2-.9 0-2.4-1.1-4-1.1C4.6 3.2 2 5.6 2 9.4c0 1.1.2 2.3.6 3.4.5 1.4 2.4 4.9 4.4 4.8 1.3 0 1.8-.9 3.4-.9 1.5 0 2 .9 3.3.9 2.1 0 3.5-2.9 4.1-4.3-2.6-1.2-2.4-4.4-2.3-5.1zM15.3 2c1.1-1.3 1.8-3.1 1.6-4.9-1.5.1-3.3 1-4.4 2.3-1 1.2-1.9 3-1.6 4.8 1.7.1 3.4-.9 4.4-2.2z"/>
                    </svg>
                </div>
                <div class="content">
                    <div class="label">通过 Apple 登录</div>
                </div>
                <div class="chevron">›</div>
            </div>
        </div>

        <!-- Section 3: Devices -->
        <div class="section">
            <!-- iPhone XR -->
            <div class="row">
                <div class="icon-wrapper device">
                    <div class="device-frame">
                        <div class="device-notch"></div>
                        <div class="device-screen"></div>
                    </div>
                </div>
                <div class="content">
                    <div class="label">双十一换安卓</div>
                    <div class="subtitle">此 iPhone XR</div>
                </div>
                <div class="chevron">›</div>
            </div>

            <!-- DESKTOP-RPT4TUV (iPhone) -->
            <div class="row">
                <div class="icon-wrapper windows">
                    <div class="windows-square ws-red"></div>
                    <div class="windows-square ws-green"></div>
                    <div class="windows-square ws-blue"></div>
                    <div class="windows-square ws-yellow"></div>
                </div>
                <div class="content">
                    <div class="label">DESKTOP-RPT4TUV</div>
                    <div class="subtitle">iPhone</div>
                </div>
                <div class="chevron">›</div>
            </div>

            <!-- DESKTOP-RPT4TUV (Windows) -->
            <div class="row">
                <div class="icon-wrapper windows">
                    <div class="windows-square ws-red"></div>
                    <div class="windows-square ws-green"></div>
                    <div class="windows-square ws-blue"></div>
                    <div class="windows-square ws-yellow"></div>
                </div>
                <div class="content">
                    <div class="label">DESKTOP-RPT4TUV</div>
                    <div class="subtitle">Windows</div>
                </div>
                <div class="chevron">›</div>
            </div>

            <!-- Mac mini -->
            <div class="row">
                <div class="icon-wrapper gray">
                    <svg class="icon-svg" viewBox="0 0 24 24" fill="none">
                        <rect x="4" y="5" width="16" height="12" rx="1.5" stroke="white" stroke-width="1.5" fill="none"/>
                        <line x1="4" y1="15" x2="20" y2="15" stroke="white" stroke-width="1.5"/>
                        <circle cx="12" cy="18" r="1" fill="white"/>
                    </svg>
                </div>
                <div class="content">
                    <div class="label">zhijian 的 Mac mini</div>
                    <div class="subtitle">Mac mini</div>
                </div>
                <div class="chevron">›</div>
            </div>
        </div>
    </div>
</body>
</html>
