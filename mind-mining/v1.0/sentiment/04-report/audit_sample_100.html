<div class="container">
  <h1>🔍 UGC情感分析样本审核</h1>

    </div>
    <div class="stat-card">
      <h3>情感分布</h3>
      <div id="sentimentStats"></div>
    </div>
  </div>

  <div class="filters">
    <label>品牌:</label>

      <option value="all">全部</option>
      <option value="其他">其他</option>

      <option value="安卓">安卓</option>
      <option value="小米">小米</option>
      <option value="苹果">苹果</option>
      <option value="荣耀">荣耀</option>
    </select>
    
    <label>情感:</label>

      <option value="负向">负向</option>
      <option value="中性">中性</option>
      <option value="混合">混合</option>
    </select>
    
    <label>强度:</label>

      <option value="all">全部</option>
      <option value="强">强</option>
      <option value="中">中</option>
      <option value="弱">弱</option>

    <label>流畅度:</label>

      <option value="false">非流畅</option>

      <option value="苹果流畅">苹果流畅</option>

    </select>
    
    <button onclick="applyFilters()">应用筛选</button>
    <button onclick="resetFilters()">重置</button>
  </div>
  
  <div id="samplesContainer"></div>
</div>

命缺陷：散热和功耗。现在手机芯片叠3层就已经热得烫手，AI训练芯片单卡功耗已达700瓦。再叠几层，一个数据中心的用电量就能赶上一个小城市。这些硬瓶颈，华为的论文里一个字都没提。\n股市有个铁律：当菜市场大妈都知道一个概念时，就是顶部；当所有券商集体唱多时，就是主力出货的时候。昨天芯片板块成交量突破3000亿创历史新高，龙虎榜显示几家头部芯片公司，机构席位净卖出超过50亿。谁在买？追涨的散户。谁在卖？提前布局的机构。\n我从不否认华为是一家伟大的公司，但伟大的公司也会做营销，也会配合资本讲故事。韬定律只是后摩尔时代的一种技术妥协，能在一定程度上提升性能，但绝对不可能取代摩尔定律，更不可能让中国芯片一夜之间超越欧美。\n这波炒作撑不过一个月。很快就会有国内外专家指出其局限性，国内研究报告也会转向“理性分析”，最后泡泡破裂，一地鸡毛。\n关注股神2016诺，带你看清资本真相，不做韭菜。", "source_keyword": "华为性能", "liked_count": 1, "comment_count": 2}, {"opinion_text": "华为门店宣称matepad pro12.2能带动大型游戏，我买回家后，发现打游戏卡成ppt", "brand_target": "华为", "sentiment_polarity": "负向", "sentiment_intensity": "强", "sentiment_reason": "打游戏卡成ppt，即使将画质调到最低也很卡，无法正常玩游戏", "confidence": "高", "is_fluency_related": true, "note_id": "68876ae800000000170370a6", "title": "耗时15天的维权结束了", "content": "起因：华为门店宣称matepad pro12.2能带动大型游戏，我买回家后，发现打游戏卡成ppt，即使将画质调到最低也很卡，无法正常玩游戏。\n经过：将平板寄回官方售后中心，检测结果是“硬件无异常”，门店说质量无问题，不予退货。我打了12315投诉，12315表示，如果我对检测结果不服，可以找第三方机构检测。\n进展：我找了该门店的店长，店长取下展示样机，下载了逆水寒与我的平板对比。样机和我的机连接同一wifi，设置同样的游戏画质和帧率，没想到样机丝毫不卡顿，而我的机卡到爆。于是店长录下对比视频，将我的机再次送去检测。\n结果：花了一周等待检测结果，然后店长告诉我可以退款了。这里要感谢店长，是真心为消费者处理问题的。大家维权的时候，也可以与样机做对比，这是一个好方法。\nPS：或许有人想问：既然样机运行逆水寒不卡，那是否可以购买这款平板用于游戏？我的建议是慎重，因为你不一定能买到样机那个质量的。", "source_keyword": "华为卡顿", "liked_count": 138, "comment_count": 73}, {"opinion_text": "想换回苹果，但是手机刚换不久，工资不高，置换折损又太大，全款又实在负担不起，纠结。", "brand_target": "苹果", "sentiment_polarity": "正向", "sentiment_intensity": "中", "sentiment_reason": "'想换回苹果'表达了对苹果手机的偏好和怀念，尽管因经济原因无法实现", "confidence": "高", "is_fluency_related": false, "note_id": "678bea44000000001901ee1c", "title": "苹果用户千万不要尝试换华为😱", "content": "宝子们，三个月前我鼓起勇气从苹果换到华为P70 Pro，现在来给大家分享一下我的纠结，到底要不要换回去呀！\n\t\n优点：\n信号好，流畅度高，操作方便，续航好，充电快\n\t\n缺点：\n拍照哒咩❌（原相机发灰，录制视频不行，前置不如后置）\n想换回苹果😮‍💨，但是手机刚换不久，工资不高，置换折损又太大，全款又实在负担不起，纠结🤦‍♂️#安卓和苹果[话题]##华为p70[话题]# #换机体验[话题]#", "source_keyword": "华为和苹果性能对比", "liked_count": 2739, "comment_count": 2932}, {"opinion_text": "还是继续用回我的13pm吧", "brand_target": "苹果", "sentiment_polarity": "正向", "sentiment_intensity": "中", "sentiment_reason": "\"继续用 化，简直逼死强迫症", "brand_target": "华为", "sentiment_polarity": "负向", "sentiment_intensity": "强", "sentiment_reason": "屏幕左上角边缘处黑边有多处一点点的，更了两次系统貌似没啥变化，简直逼死强迫症", "confidence": "高", "is_fluency_related": false, "note_id": "69c0f28400000000230104a4", "title": "华为80rs", "content": "大家的80rs屏幕左上角边缘处黑边 有没有多处一点点的，感觉跟“骨质增生”一样，有说是屏幕抗锯齿系统原因没做好的，有说系统更新就好了，我更了两次系统貌似没啥变化，简直逼死强迫症！实体店新机购入的！[哭惹R]", "source_keyword": "华为和苹果丝滑对比", "liked_count": 29, "comment_count": 141}, {"opinion_text": "3D人脸终于上mate手机标准版了，普天同庆", "brand_target": "华为", "sentiment_polarity": "正向", "sentiment_intensity": "中", "sentiment_reason": "普天同庆", "confidence": "高", "is_fluency_related": false, "note_id": "69b19d4900000000230393aa", "title": "华为Mate80使用3个月感受", "content": "在25年12月7日某场神秘考试结束后购入，已经用了三个多月了，浅要聊下这个手机。\n缺点：1.影像：成像不好，从摄像模组可以看出主摄和长焦的底不大，主摄在阴天下成像会有很灰的感觉；而长焦的5.5x的焦段实在太远，很不实用，而且在用长焦拍摄树、花之类比较小需要精确对焦的情况下，会出现虚焦对不准物体的情况，即使用手去点击对焦也无法避免。\n\t\n2.手机形制：我更喜欢四微曲屏和弧形边框，但整个mate80系列全部变成直屏直边框，怀念mate60 pro。并且这代mate手机实在没有什么设计感，甚至连mate70都比其有设计感。\n\t\n3.系统ui设计：鸿蒙6以来肉眼可见华为一直在抄苹果设计，从居中实况窗，到的玻璃效果，到现在升级到328系统的状态栏苹果化。有人会说这样可以减少苹果换华为的门槛，换个手机要多少门槛，不知道华为的UX部门怎么想的。一个高端品牌，没了自己的调性，选择去拟合其他高端品牌，就已经默认技不如人了，制裁都这么有骨气，怎么现在就萎了。当然系统适配也是问题，这个能理解，就不说了。\n\t\n优点：1.影像：虽然是标准版比不上mate80pro max的视频录制能力，但视频变焦能力得到极大加强，变焦现在很丝滑，基本达到了非苹果阵营的一流水准了。并且视频录制的流畅度和承受时长也有增强，至少冬天测试下来半个小时都没问题，就是比较耗电。\n\t\n2.系统流畅：前面虽然吐槽了系统ui设计邯郸学步的问题，但系统的操作手感很好，当然在高负载的情况下下拉通知栏可能会有一瞬间的掉帧，但如果再次下来就不会掉帧了。\n\t\n3.性能与续航：客观来讲麒麟9020肯定不如当前市面的骁龙a系旗舰芯片和麒麟9030pro的性能强，估摸着也就骁龙8＋的水平。续航已经可以满足极高强度使用手机的情况下半天的要求。\n4.3D人脸终于上mate手机标准版了，普天同庆。\n\t\n总结：该手机是我在mate80系列发售刚好一周购入，当时80pm、80pro全面无货，就买了80标准版。该手机实际体验还是可以的，但跟苹果学坏了用上代芯片，屏幕也保持了华为一贯的高水准。目前来看还是买pm最好。\n\t\n#华为[话题]# #鸿蒙[话题]# #鸿蒙6[话题]# #鸿蒙next[话题]# #mate80[话题]# #麒麟9020[话题]# #手机体验感[话题]# #手机分享[话题]# #手机推荐[话题]# #华为mate[话题]#", "source_keyword": "华为丝滑", "liked_count": 345, "comment_count": 142}];
var BRAND_DIST = {"华为": 48, "苹果": 45, "安卓": 2, "荣耀": 3, "其他": 1, "小米": 1};
var POLARITY_DIST = {"负向": 43, "中性": 8, "正向": 44, "混合": 5};

function getBrandClass(brand) {
  var map = {'华为': 'brand-huawei', '苹果': 'brand-apple', '三星': 'brand-samsung', 
              '小米': 'brand-xiaomi', 'OPPO': 'brand-oppo', 'vivo': 'brand-vivo',
              '安卓': 'brand-android', '荣耀': 'brand-other'};
  return map[brand] || 'brand-other';
}

function getPolarityClass(polarity) {
  var map = {'正向': 'polarity-positive', '负向': 'polarity-negative', 
              '中性': 'polarity-neutral', '混合': 'polarity-mixed'};
  return map[polarity] || 'polarity-neutral';
}

function getIntensityClass(intensity) {
  var map = {'强': 'intensity-strong', '中': 'intensity-medium', '弱': 'intensity-weak'};
  return map[intensity] || 'intensity-weak';
}

function getConfidenceClass(confidence) {
  var map = {'高': 'confidence-high', '中': 'confidence-medium', '低': 'confidence-low'};
  return map[confidence] || 'confidence-medium';
}

function toggleExpand(btn) {
  var contentId = btn.getAttribute("data-target");
  var content = document.getElementById(contentId);
  if (content.classList.contains('expanded')) {
    content.classList.remove('expanded');
    btn.textContent = '展开原贴';
  } else {
    content.classList.add('expanded');
    btn.textContent = '收起原贴';
  }
}

function renderStats() {
  var brandContainer = document.getElementById('brandStats');
  var brandHtml = '';
  var brands = Object.keys(BRAND_DIST).sort(function(a, b) { return BRAND_DIST[b] - BRAND_DIST[a]; });
  brands.forEach(function(brand) {
    brandHtml += '<div class="stat-row"><span class="stat-label">' + brand + '</span><span class="stat-value">' + BRAND_DIST[brand] + '</span></div>';
  });
  brandContainer.innerHTML = brandHtml;
  
  var sentimentContainer = document.getElementById('sentimentStats');
  var sentimentHtml = '';
  var sentiments = ['正向', '负向', '中性', '混合'];
  sentiments.forEach(function(s) {
    sentimentHtml += '<div class="stat-row"><span class="stat-label">' + s + '</span><span class="stat-value">' + (POLARITY_DIST[s] || 0) + '</span></div>';
  });
  sentimentContainer.innerHTML = sentimentHtml;
}

function renderSamples(samples) {
  var container = document.getElementById('samplesContainer');
  var html = '';
  samples.forEach(function(s, idx) {
    var contentId = 'content_' + idx;
    html += '<div class="sample-card" data-brand="' + s.brand_target + '" data-polarity="' + s.sentiment_polarity + '" data-intensity="' + s.sentiment_intensity + '" data-fluency="' + s.is_fluency_related + '" data-keyword="' + s.source_keyword + '"' + '>';
    
    html += '<div class="card-header">';
    html += '<span class="card-id"># ' + (idx + 1) + ' | ' + s.note_id.substring(0, 16) + '...</span>';
    html += '<div class="tags">';
    html += '<span class="tag ' + getBrandClass(s.brand_target) + '">' + s.brand_target + '</span>';
    html += '<span class="tag ' + getPolarityClass(s.sentiment_polarity) + '">' + s.sentiment_polarity + '</span>';
    html += '<span class="tag ' + getIntensityClass(s.sentiment_intensity) + '">' + s.sentiment_intensity + '</span>';
    if (s.is_fluency_related) {
      html += '<span class="tag fluency-yes">流畅</span>';
    } else {
      html += '<span class="tag fluency-no">非流畅</span>';
    }
    html += '<span class="tag ' + getConfidenceClass(s.confidence) + '">置信:' + s.confidence + '</span>';
    html += '</div>';
    html += '</div>';
    
    html += '<div class="original-post">';
    html += '<div class="original-post-title">📌 ' + (s.title || '无标题').substring(0, 100);
    html += '<button class="expand-btn" data-target="' + contentId + '" onclick="toggleExpand(this)">展开原贴</button>';
    html += '</div>';
    html += '<div class="original-post-content" id="' + contentId + '"' + '>' + (s.content || '') + '</div>';
    html += '</div>';
    
    html += '<div class="opinion-text"><strong>提取观点:</strong><br>' + s.opinion_text + '</div>';
    html += '<div class="opinion-reason"><strong>证据:</strong> ' + (s.sentiment_reason || '') + '</div>';
    html += '<div class="card-meta"><span>👍 ' + (s.liked_count || 0) + '</span><span>💬 ' + (s.comment_count || 0) + '</span><span>来源: ' + s.source_keyword + '</span></div>';
    html += '</div>';
  });
  container.innerHTML = html;
  document.getElementById('countBadge').textContent = '显示: ' + samples.length + ' / ' + SAMPLES.length;
}

function applyFilters() {
  var brand = document.getElementById('filterBrand').value;
  var polarity = document.getElementById('filterPolarity').value;
  var intensity = document.getElementById('filterIntensity').value;
  var fluency = document.getElementById('filterFluency').value;
  var keyword = document.getElementById('filterKeyword').value;
  
  var filtered = SAMPLES.filter(function(s) {
    if (brand !== 'all' && s.brand_target !== brand) return false;
    if (polarity !== 'all' && s.sentiment_polarity !== polarity) return false;
    if (intensity !== 'all' && s.sentiment_intensity !== intensity) return false;
    if (fluency !== 'all' && String(s.is_fluency_related) !== fluency) return false;
    if (keyword !== 'all' && s.source_keyword !== keyword) return false;
    return true;
  });
  
  renderSamples(filtered);
}

function resetFilters() {
  document.getElementById('filterBrand').value = 'all';
  document.getElementById('filterPolarity').value = 'all';
  document.getElementById('filterIntensity').value = 'all';
  document.getElementById('filterFluency').value = 'all';
  document.getElementById('filterKeyword').value = 'all';
  renderSamples(SAMPLES);
}

renderStats();
renderSamples(SAMPLES);
</script>
