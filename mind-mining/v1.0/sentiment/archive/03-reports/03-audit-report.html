: {"华为": {"fluency": 43, "total": 143}, "苹果": {"fluency": 23, "total": 68}, "安卓": {"fluency": 1, "total": 2}, "其他": {"fluency": 0, "total": 2}, "vivo": {"fluency": 0, "total": 1}, "OPPO": {"fluency": 0, "total": 1}}, "net_scores": {"华为": 30, "苹果": -2, "安卓": -2, "其他": 2, "vivo": 1, "OPPO": 1}, "keyword_counts": {"华为和苹果性能对比": 114, "华为和苹果流畅度对比": 98, "华为和苹果卡顿对比": 5}, "time_range": {"min": "2024-02-09", "max": "2026-05-19"}}};
var opinions = data.opinions;
var stats = data.stats;
var currentFilters = {brand: 'all', polarity: 'all', fluency: 'all', keyword: 'all'};
var currentSort = 'default';
var filteredOpinions = opinions.slice();

function renderStats() {
  var brandColors = {'华为': '#dc2626', '苹果': '#2563eb', '三星': '#9333ea', '小米': '#ea580c', 'OPPO': '#22c55e', 'vivo': '#06b6d4', '安卓': '#84cc16', '其他': '#6b7280'};
  var polColors = {'正向': '#22c55e', '负向': '#ef4444', '中性': '#6b7280', '混合': '#f59e0b'};
  var intColors = {'强': '#ef4444', '中': '#eab308', '弱': '#3b82f6'};

  // 品牌分布
  var brandHtml = '';
  for (var b in stats.brand_counts) {
    var pct = (stats.brand_counts[b] / stats.total_opinions * 100).toFixed(1);
    var color = brandColors[b] || '#6b7280';
    brandHtml += '<div class="stat-item"><span>' + b + '</span><span>' + stats.brand_counts[b] + ' (' + pct + '%)</span></div>';
    brandHtml += '<div class="stat-bar"><div class="stat-bar-fill" style="width:' + pct + '%;background:' + color + '"></div></div>';
  }
  document.getElementById('brand-stats').innerHTML = brandHtml;

  // 情绪分布
  var polHtml = '';
  for (var p in stats.polarity_counts) {
    var pct = (stats.polarity_counts[p] / stats.total_opinions * 100).toFixed(1);
    var color = polColors[p] || '#6b7280';
    polHtml += '<div class="stat-item"><span>' + p + '</span><span>' + stats.polarity_counts[p] + ' (' + pct + '%)</span></div>';
    polHtml += '<div class="stat-bar"><div class="stat-bar-fill" style="width:' + pct + '%;background:' + color + '"></div></div>';
  }
  document.getElementById('polarity-stats').innerHTML = polHtml;

  // 强度分布
  var intHtml = '';
  for (var i in stats.intensity_counts) {
    var pct = (stats.intensity_counts[i] / stats.total_opinions * 100).toFixed(1);
    var color = intColors[i] || '#6b7280';
    intHtml += '<div class="stat-item"><span>' + i + '</span><span>' + stats.intensity_counts[i] + ' (' + pct + '%)</span></div>';
    intHtml += '<div class="stat-bar"><div class="stat-bar-fill" style="width:' + pct + '%;background:' + color + '"></div></div>';
  }
  document.getElementById('intensity-stats').innerHTML = intHtml;

  // 流畅性分布
  var fluHtml = '';
  var fluTotal = stats.fluency_counts['true'] || 0;
  var fluPct = (fluTotal / stats.total_opinions * 100).toFixed(1);
  fluHtml += '<div class="stat-item"><span>流畅相关</span><span>' + fluTotal + ' (' + fluPct + '%)</span></div>';
  fluHtml += '<div class="stat-bar"><div class="stat-bar-fill" style="width:' + fluPct + '%;background:#06b6d4"></div></div>';
  for (var b in stats.brand_fluency) {
    var bf = stats.brand_fluency[b];
    var bpct = (bf.fluency / bf.total * 100).toFixed(1);
    fluHtml += '<div class="stat-item" style="font-size:11px;color:#8892b0;"><span>' + b + '</span><span>' + bf.fluency + '/' + bf.total + ' (' + bpct + '%)</span></div>';
  }
  document.getElementById('fluency-stats').innerHTML = fluHtml;

  // 品牌×情绪矩阵
  var matrixHtml = '<table class="matrix-table">';
  matrixHtml += '<tr><th>品牌\情绪</th><th>正向</th><th>负向</th><th>中性</th><th>混合</th><th>净得分</th></tr>';
  var polOrder = ['正向', '负向', '中性', '混合'];
  var polBgColors = {'正向': 'rgba(34,197,94,0.15)', '负向': 'rgba(239,68,68,0.15)', '中性': 'rgba(107,114,128,0.15)', '混合': 'rgba(245,158,11,0.15)'};
  for (var b in stats.brand_polarity) {
    var bp = stats.brand_polarity[b];
    var net = (bp['正向'] || 0) - (bp['负向'] || 0);
    var netColor = net > 0 ? '#22c55e' : (net < 0 ? '#ef4444' : '#6b7280');
    matrixHtml += '<tr>';
    matrixHtml += '<td style="font-weight:600;">' + b + '</td>';
    for (var pi = 0; pi < polOrder.length; pi++) {
      var pol = polOrder[pi];
      var cnt = bp[pol] || 0;
      var total = stats.brand_counts[b] || 1;
      var pct = (cnt / total * 100).toFixed(0);
      var bg = polBgColors[pol];
      matrixHtml += '<td style="background:' + bg + ';">';
      matrixHtml += '<div class="matrix-count">' + cnt + '</div>';
      matrixHtml += '<div class="matrix-pct">' + pct + '%</div>';
      matrixHtml += '</td>';
    }
    matrixHtml += '<td style="color:' + netColor + ';font-weight:600;">' + (net > 0 ? '+' : '') + net + '</td>';
    matrixHtml += '</tr>';
  }
  matrixHtml += '</table>';
  document.getElementById('matrix-stats').innerHTML = matrixHtml;
}

function getBrandClass(brand) {
  var map = {'华为': 'tag-huawei', '苹果': 'tag-apple', '三星': 'tag-samsung', '小米': 'tag-xiaomi', 'OPPO': 'tag-oppo', 'vivo': 'tag-vivo', '安卓': 'tag-android'};
  return map[brand] || 'tag-other';
}

function getPolarityClass(pol) {
  var map = {'正向': 'tag-pos', '负向': 'tag-neg', '中性': 'tag-neu', '混合': 'tag-mix'};
  return map[pol] || 'tag-neu';
}

function getIntensityClass(intens) {
  var map = {'强': 'tag-strong', '中': 'tag-medium', '弱': 'tag-weak'};
  return map[intens] || 'tag-weak';
}

function getConfidenceClass(conf) {
  var map = {'高': 'tag-high', '中': 'tag-mid', '低': 'tag-low'};
  return map[conf] || 'tag-mid';
}

function applyFilters() {
  filteredOpinions = opinions.filter(function(op) {
    if (currentFilters.brand !== 'all' && op.brand_target !== currentFilters.brand) return false;
    if (currentFilters.polarity !== 'all' && op.sentiment_polarity !== currentFilters.polarity) return false;
    if (currentFilters.fluency !== 'all') {
      var flu = op.is_fluency_related ? 'true' : 'false';
      if (flu !== currentFilters.fluency) return false;
    }
    if (currentFilters.keyword !== 'all' && op.source_keyword !== currentFilters.keyword) return false;
    return true;
  });
  applySort();
}

function applySort() {
  if (currentSort === 'time-desc') {
    filteredOpinions.sort(function(a, b) { return b.publish_time_raw - a.publish_time_raw; });
  } else if (currentSort === 'time-asc') {
    filteredOpinions.sort(function(a, b) { return a.publish_time_raw - b.publish_time_raw; });
  } else if (currentSort === 'likes-desc') {
    filteredOpinions.sort(function(a, b) { return b.liked_count - a.liked_count; });
  } else if (currentSort === 'comments-desc') {
    filteredOpinions.sort(function(a, b) { return b.comment_count - a.comment_count; });
  } else {
    // default: by opinion_id
    filteredOpinions.sort(function(a, b) {
      var aId = a.opinion_id;
      var bId = b.opinion_id;
      if (aId < bId) return -1;
      if (aId > bId) return 1;
      return 0;
    });
  }
}

function renderOpinions() {
  document.getElementById('count-badge').textContent = '显示: ' + filteredOpinions.length + ' / ' + opinions.length;

  var html = '';
  for (var i = 0; i < filteredOpinions.length; i++) {
    var op = filteredOpinions[i];
    var contentId = 'content-' + op.opinion_id;
    html += '<div class="opinion-card">';
    html += '<div class="original-post">';
    html += '<div class="post-title">📌 ' + (op.title || '').substring(0, 80) + (op.title && op.title.length > 80 ? '...' : '') + '</div>';
    html += '<div class="expand-btn" data-target="' + contentId + '" onclick="toggleContent(this)">展开原贴</div>';
    html += '<div class="post-content" id="' + contentId + '" data-opinion-id="' + op.opinion_id + '">';
    html += '<strong>标题:</strong> ' + (op.full_title || '') + '<br><br>';
    html += '<strong>内容:</strong> ' + (op.full_content || '').replace(/\n/g, '<br>') + '</div>';
    html += '</div>';
    html += '<div class="tags">';
    html += '<span class="tag ' + getBrandClass(op.brand_target) + '">' + op.brand_target + '</span>';
    html += '<span class="tag ' + getPolarityClass(op.sentiment_polarity) + '">' + op.sentiment_polarity + '</span>';
    html += '<span class="tag ' + getIntensityClass(op.sentiment_intensity) + '">' + op.sentiment_intensity + '</span>';
    html += '<span class="tag ' + (op.is_fluency_related ? 'tag-fluency-yes' : 'tag-fluency-no') + '">' + (op.is_fluency_related ? '流畅✓' : '流畅✗') + '</span>';
    html += '<span class="tag ' + getConfidenceClass(op.confidence) + '">置信:' + op.confidence + '</span>';
    html += '</div>';
    html += '<div class="opinion-text">' + op.opinion_text + '</div>';
    html += '<div class="reason">' + op.sentiment_reason + '</div>';
    html += '<div class="source">';
    html += '<div class="source-left">';
    html += '<span>🔍 ' + op.source_keyword + '</span>';
    html += '<span>📅 ' + (op.publish_time || '未知') + '</span>';
    html += '</div>';
    html += '<span>❤️ ' + op.liked_count + ' 💬 ' + op.comment_count + '</span>';
    html += '</div>';
    html += '</div>';
  }
  document.getElementById('opinions-list').innerHTML = html;
}

function toggleContent(btn) {
  var id = btn.getAttribute('data-target');
  var el = document.getElementById(id);
  if (el.classList.contains('expanded')) {
    el.classList.remove('expanded');
    btn.textContent = '展开原贴';
  } else {
    el.classList.add('expanded');
    btn.textContent = '收起原贴';
  }
}

function filterBrand(brand) {
  currentFilters.brand = brand;
  applyFilters();
  renderOpinions();
}

function filterPolarity(pol) {
  currentFilters.polarity = pol;
  applyFilters();
  renderOpinions();
}

function filterFluency(flu) {
  currentFilters.fluency = flu;
  applyFilters();
  renderOpinions();
}

function filterKeyword(kw) {
  currentFilters.keyword = kw;
  applyFilters();
  renderOpinions();
}

function sortOpinions(sortType) {
  currentSort = sortType;
  applySort();
  renderOpinions();
}

function resetFilters() {
  currentFilters = {brand: 'all', polarity: 'all', fluency: 'all', keyword: 'all'};
  currentSort = 'default';
  applyFilters();
  renderOpinions();
}

renderStats();
applyFilters();
renderOpinions();
</script>
