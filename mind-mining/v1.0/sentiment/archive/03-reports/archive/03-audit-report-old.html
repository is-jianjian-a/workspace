function renderStats() {
  renderBrandStats();
  renderPolarityStats();
  renderIntensityStats();
  renderCrossTable();
}

function renderBrandStats() {
  var container = document.getElementById('brandStats');
  var html = '';
  var total = OPINIONS.length;
  var brands = Object.keys(BRAND_DIST).sort(function(a, b) { return BRAND_DIST[b] - BRAND_DIST[a]; });
  brands.forEach(function(brand) {
    var count = BRAND_DIST[brand];
    var pct = ((count / total) * 100).toFixed(1);
    html += '<div class="stat-row">';
    html += '<span class="stat-label">' + brand + '</span>';
    html += '<span class="stat-value">' + count + ' (' + pct + '%)</span>';
    html += '</div>';
    html += '<div class="bar-container"><div class="bar" style="width:' + pct + '%;background:#4f46e5"></div></div>';
  });
  container.innerHTML = html;
}

function renderPolarityStats() {
  var container = document.getElementById('polarityStats');
  var html = '';
  var total = OPINIONS.length;
  var polarities = ['正向', '负向', '中性', '混合'];
  var colors = ['bar-positive', 'bar-negative', 'bar-neutral', 'bar-mixed'];
  polarities.forEach(function(pol, idx) {
    var count = POLARITY_DIST[pol] || 0;
    var pct = ((count / total) * 100).toFixed(1);
    html += '<div class="stat-row">';
    html += '<span class="stat-label">' + pol + '</span>';
    html += '<span class="stat-value">' + count + ' (' + pct + '%)</span>';
    html += '</div>';
    html += '<div class="bar-container"><div class="bar ' + colors[idx] + '" style="width:' + pct + '%"></div></div>';
  });
  container.innerHTML = html;
}

function renderIntensityStats() {
  var container = document.getElementById('intensityStats');
  var html = '';
  var total = OPINIONS.length;
  var intensities = ['强', '中', '弱'];
  var colors = ['#f87171', '#fbbf24', '#60a5fa'];
  intensities.forEach(function(intensity, idx) {
    var count = 0;
    OPINIONS.forEach(function(op) { if (op.sentiment_intensity === intensity) count++; });
    var pct = ((count / total) * 100).toFixed(1);
    html += '<div class="stat-row">';
    html += '<span class="stat-label">' + intensity + '</span>';
    html += '<span class="stat-value">' + count + ' (' + pct + '%)</span>';
    html += '</div>';
    html += '<div class="bar-container"><div class="bar" style="width:' + pct + '%;background:' + colors[idx] + '"></div></div>';
  });
  container.innerHTML = html;
}

function renderCrossTable() {
  var tbody = document.getElementById('crossBody');
  var html = '';
  var brands = Object.keys(CROSS_DATA).sort(function(a, b) {
    var sumA = 0, sumB = 0;
    Object.values(CROSS_DATA[a]).forEach(function(v) { sumA += v; });
    Object.values(CROSS_DATA[b]).forEach(function(v) { sumB += v; });
    return sumB - sumA;
  });
  brands.forEach(function(brand) {
    html += '<tr>';
    html += '<td><strong>' + brand + '</strong></td>';
    html += '<td>' + (CROSS_DATA[brand]['正向'] || 0) + '</td>';
    html += '<td>' + (CROSS_DATA[brand]['负向'] || 0) + '</td>';
    html += '<td>' + (CROSS_DATA[brand]['中性'] || 0) + '</td>';
    html += '<td>' + (CROSS_DATA[brand]['混合'] || 0) + '</td>';
    html += '</tr>';
  });
  tbody.innerHTML = html;
}

function getBrandClass(brand) {
  var map = {'华为': 'brand-huawei', '苹果': 'brand-apple', '三星': 'brand-samsung', 
              '小米': 'brand-xiaomi', 'OPPO': 'brand-oppo', 'vivo': 'brand-vivo',
              '安卓': 'brand-android'};
  return map[brand] || 'brand-other';
}

function getPolarityClass(polarity) {
  var map = {'正向': 'polarity-positive', '负向': 'polarity-negative', 
              '中性': 'polarity-neutral', '混合': 'polarity-mixed'};
  return map[polarity] || 'polarity-neutral';
}

function getIntensityClass(intensity) {
  var map = {'强': 'intensity-strong', '中': 'intensity-medium', '弱': 'intensity-weak'};
  return map[intensity] || 'intensity-weak';
}

function getConfidenceClass(confidence) {
  var map = {'高': 'confidence-high', '中': 'confidence-medium', '低': 'confidence-low'};
  return map[confidence] || 'confidence-medium';
}

function renderOpinions(opinions) {
  var container = document.getElementById('opinionList');
  var html = '';
  opinions.forEach(function(op) {
    html += '<div class="opinion-card" data-brand="' + op.brand_target + '" data-polarity="' + op.sentiment_polarity + '" data-intensity="' + op.sentiment_intensity + '" data-confidence="' + op.confidence + '" data-keyword="' + op.source_keyword + '">';
    html += '<div class="opinion-header">';
    html += '<div class="opinion-meta">';
    html += '<span class="tag ' + getBrandClass(op.brand_target) + '">' + op.brand_target + '</span>';
    html += '<span class="tag ' + getPolarityClass(op.sentiment_polarity) + '">' + op.sentiment_polarity + '</span>';
    html += '<span class="tag ' + getIntensityClass(op.sentiment_intensity) + '">' + op.sentiment_intensity + '</span>';
    html += '<span class="tag ' + getConfidenceClass(op.confidence) + '">置信:' + op.confidence + '</span>';
    html += '</div>';
    html += '<div style="font-size:12px;color:#666">ID: ' + op.opinion_id + '</div>';
    html += '</div>';
    html += '<div style="font-size:13px;color:#888;margin-bottom:8px">' + (op.title || '') + '</div>';
    html += '<div class="opinion-text">' + op.opinion_text + '</div>';
    html += '<div class="opinion-reason"><strong>判断理由:</strong> ' + op.sentiment_reason + '</div>';
    html += '<div class="opinion-source">来源: ' + op.source_keyword + ' | 点赞:' + (op.liked_count || 0) + ' 评论:' + (op.comment_count || 0) + '</div>';
    html += '</div>';
  });
  container.innerHTML = html;
  document.getElementById('countBadge').textContent = '显示: ' + opinions.length + ' / ' + OPINIONS.length;
}

    if (brand !== 'all' && op.brand_target !== brand) return false;
    if (polarity !== 'all' && op.sentiment_polarity !== polarity) return false;
    if (intensity !== 'all' && op.sentiment_intensity !== intensity) return false;
    if (confidence !== 'all' && op.confidence !== confidence) return false;
    if (keyword !== 'all' && op.source_keyword !== keyword) return false;
    return true;
  });
  
  renderOpinions(filtered);
}

function resetFilters() {
  document.getElementById('filterBrand').value = 'all';
  document.getElementById('filterPolarity').value = 'all';
  document.getElementById('filterIntensity').value = 'all';
  document.getElementById('filterConfidence').value = 'all';
  document.getElementById('filterKeyword').value = 'all';
  renderOpinions(OPINIONS);
}

// 初始化
renderStats();
renderOpinions(OPINIONS);
</script>
