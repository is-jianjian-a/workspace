  .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
  .btn-primary { background: #2196F3; color: white; }
  .btn-primary:hover { background: #1976D2; }
  .btn-success { background: #4CAF50; color: white; }
  .btn-success:hover { background: #388E3C; }
  .btn-warning { background: #FF9800; color: white; }

  .tag-item.theme-稳定性 { border-left-color: #FF9800; }
  .tag-item.theme-流畅丝滑 { border-left-color: #4CAF50; }
  
  .tag-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 5px; }
  .tag-theme { font-weight: bold; font-size: 13px; padding: 3px 10px; border-radius: 12px; color: white; }

  .sentiment-苹果好 { background: #FFF3E0; color: #E65100; }
  .sentiment-其他 { background: #F5F5F5; color: #616161; }

</style>

<div class="container">

  <!-- 统计面板 -->

  </div>

  </div>

  <div class="ugc-list" id="ugcList"></div>
  
  <!-- 导出区域 -->
  <div class="export-area" id="exportArea">
    <h3 style="margin-bottom: 10px;">修改记录导出</h3>
    <textarea class="export-textarea" id="exportTextarea" readonly></textarea>
    <button class="btn btn-primary" style="margin-top: 10px;" onclick="copyExport()">📋 复制到剪贴板</button>
  </div>
  
  <!-- 修改意见导出区域 -->
  <div class="export-area" id="commentsArea">
    <h3 style="margin-bottom: 10px;">修改意见导出</h3>
    <textarea class="export-textarea" id="commentsTextarea" readonly></textarea>
    <button class="btn btn-primary" style="margin-top: 10px;" onclick="copyComments()">📋 复制到剪贴板</button>
  </div>
</div>

ColorOS 16流畅度不相上下的还有鸿蒙OS，iOS26说实话用过ColorOS16后，感觉也就那么回事了。\n以上仅是我的个人观点哈~\n-\n还有就是细节功能上ColorOS 16做得也还行，AI人像补光，便签AI写作、AI实景对话这些实用性都很强。\n-\n反正让我选的话，在对比体验后会闭眼选ColorOS 16，首发机型是Find X9系列，10月16亮相，想抢先体验话，蹲Find X9完事~", "liked_count": 219, "comment_count": 25, "share_count": 5, "collected_count": 29, "source_keyword": "华为和苹果丝滑对比", "create_time": "2025-10-15 12:42:59", "interaction": 278, "is_dual_holder": true, "tone_score": 8.0, "sentiment_v2": "其他", "extracted_models": []}, {"note_id": "68ff3530000000000700cd51", "title": "记一下鸿蒙6.0各大软件的鸿蒙适配情况", "content": "已从鸿蒙4.2升至鸿蒙6.0两天了，目前没发现什么致命的问题，系统流畅度提升肉眼可见，遂想着记录一下使用过程中发现的各大软件适配问题，给还在犹豫要不要升级的花粉参考一下\n\t\n本人机型：Pura70Pro\n当前系统：6.0.0.130 SP18\n\t\nP2：微信8.0.15\nP3：QQ9.2.10.5265，网易云9.4.70，拼多多7.98.0，哔哩哔哩8.34.0\nP4：小红书9.20.0，抖音38.0.0，闲鱼7.24.91.3，美团12.53.402\n持续更新ing\n\t\n以下是升级近一个月使用感受：\n首先是好的地方，系统还是比鸿蒙4.2流畅不少，太丝滑了现在。然后是对于隐私的保护很好，可以随时查看刚才有那些应用调用了隐私权限。个性化方面锁屏有了小卡片还有了景深壁纸，利于我这个喜欢装扮手机的用户。小艺任务很方便，我是直接让小艺到点帮我打卡，妈妈再也不担心我忘记打卡了。鸿蒙有礼签到一个月拿到了110+的现金红包，还能每天抽影视年卡会员。\n然后是有待改进的地方，首先仍然是各软件的适配问题，不难看出各大软件仍然或多或少的有功能尚未对齐主流版本，这里面有没有影响用户的工作生活就见仁见智了。其次是现在还是内测版本，会有诸如部分界面显示异常的bug，这点估计等明年正式版发布会好很多。\n\t\n为什么不能看年度报告啊", "liked_count": 1006, "comment_count": 1004, "share_count": 1127, "collected_count": 422, "source_keyword": "华为和苹果丝滑对比", "create_time": "2025-10-27 17:02:40", "interaction": 3559, "is_dual_holder": false, "tone_score": 3.5, "sentiment_v2": "其他", "extracted_models": ["华为Pura70", "华为Pura70Pro"]}, {"note_id": "6926b0c8000000001d039299", "title": "ProMax更香？四款华为Mate80到底怎么选？", "content": "没想到今年的华为mate80系列降价了，便宜了500-800块，加上配置大升级，我感觉都好香，那怎么选呢？\n\t\n标准版的亮点是3D人脸解锁，其他配置也不错；Pro版的性能更强，还有长焦微距，性价比很高；\n\t\nProMax则是要啥有啥，双层OLED屏幕、双潜望长焦，甚至独占全金属机身，16+512g卖7999，是比较的；\n\t\n至于Mate80非凡大师，一万多的手机，自然是华为的顶级旗舰了，音质和质感更好，预算够的自然推荐。", "liked_count": 108, "comment_count": 11, "share_count": 39, "collected_count": 36, "source_keyword": "华为和苹果丝滑对比", "create_time": "2025-11-26 15:48:24", "interaction": 194, "is_dual_holder": false, "tone_score": 1.0, "sentiment_v2": "其他", "extracted_models": ["华为Mate80"]}, {"note_id": "69297082000000000d037a8d", "title": "三大系统同台PK，差别还是挺大的", "content": "鸿蒙6体验又强了不少，这下iOS安卓鸿蒙三足鼎立的格局更稳了！如果要选出三大阵营的代表作，我认为是iOS26、ColorOS16和鸿蒙6，你们觉得呢？\n\t\n给大家简单对比一下这三大系统吧。\n\t\n先看UI主题这块，iOS26的液态玻璃设计还是太权威了，视效是真的好看；ColorOS 16全新的光场设计也很耐看；鸿蒙6的视效则很灵动。\n\t\n流畅度没啥好说的，都是妥妥的T0选手，三大系统在动画上都做得很好，丝滑跟手，ColorOS 16能打破桎梏达到这个效果，可以说是安卓的流畅代表了！\n\t\n灵动岛也有一些差异，iOS虽然引领了灵动岛，但app适配还得加把劲；ColorOS 16的流体云和鸿蒙6的实况窗都支持更多应用组合岛，多服务一触即达。\n\t\nAI方面，就拿AI拍照问答来说，iOS26海外版本是支持的，但国行版还没实装AI大模型能力；而鸿蒙6支持即时识屏问答；ColorOS16不仅支持一键问屏，还有跨应用的内容传送门，体验都很不错。\n\t\n总之三大系统各有特点吧，你们用过这些系统吗？你更喜欢谁家的系统？", "liked_count": 138, "comment_count": 2, "share_count": 2, "collected_count": 23, "source_keyword": "华为和苹果丝滑对比", "create_time": "2025-11-28 17:50:58", "interaction": 165, "is_dual_holder": true, "tone_score": 7.0, "sentiment_v2": "其他", "extracted_models": []}, {"note_id": "6932b88d000000001e0054b5", "title": "放以前不敢想，三大系统体验一目了然!", "content": "以前都是iOS丝滑程度领先，但近几年iOS、鸿蒙、ColorOS三大系统丝滑程度都是T0级别的了！下面就是鸿蒙6、iOS26以及ColorOS 16三大系统，流畅度的对比很明显了吧？\n\t\n这三都是T0级别的手机系统，动画效果都很到位了，只是部分细节有差异。像打断动画这种基础，这三家都做得很到位了。\n\t\n而灵动岛回收的动画，苹果和OPPO的会更圆润一些。小窗这块苹果还是画中画，华为OPPO是都已经支持多窗口了。全局搜索处的打断动画华为反应很快，OPPO则还能做到从哪来回哪去，苹果就稍微有点延迟了。\n\t\n实际差距很小的，今年搭载这三大系统的旗舰机型都挺值得入的。像华为Mate80 Pro，在鸿蒙6的加持下日常使用流畅体验有保障。iPhone 17 Pro配置全面升级后，iOS 26也更好发挥了。OPPO Find X9 Pro在ColorOS 16的加持下，已经成为安卓流畅的代表了，2亿像素、丹霞色彩还原镜头、7500mAh等配置也让它体验更全面。\n\t\n大家觉得，这三大系统哪个更强？你现在用的手机是什么系统呢？", "liked_count": 118, "comment_count": 1, "share_count": 2, "collected_count": 15, "source_keyword": "华为和苹果丝滑对比", "create_time": "2025-12-05 18:48:46", "interaction": 136, "is_dual_holder": true, "tone_score": 7.0, "sentiment_v2": "苹果好", "extracted_models": ["华为Mate80"]}, {"note_id": "6937ee45000000001f00c76b", "title": "就这？三款ProMax人像对比谁好看？", "content": "📷后置P1\n📷自拍P2\n\t\n先说我没想到的，那就是华为Mate80 Pro Max拍出来，色调会冷很多，不说是有第二代红枫原色镜头，色温更精准吗？\n但感觉好像没有iPhone17 Pro Max准……\n不过华为的美颜把控非常好，介于iPhone的真实和小米美颜之间，会给我一种刚刚好的感觉，特别是在自拍的时候！\n\t\n小米的照片对比度更高一些，可能这就是徕卡味？\n\t\niPhone的皮肤最真实自然，色调也是我最喜欢的\n你们觉得哪一款Pro Max的表现最好？", "liked_count" ”啦!\n\t\n首先呢，市面上常用的处理器品牌有四种，分别是美国的苹果 A 系列处理器、美国的高通骁龙系列处理器、中国台湾的天玑系列处理器和华为的麒麟系列处理器。\n\t\n苹果的 A 系列处理器不必多说，在同期就是无敌的存在。而华为的麒麟芯片处理器在被制裁前也是相当厉害的，妥妥的世界第一梯队，可是后来由于被制裁，情况急转直下。但根据如今的情况来看，华为重返第一梯队还是指日可待的。\n\t\n说完苹果和华为的芯片，咱们要唠唠如今安卓机里用得最多的骁龙和天玑芯片了。往些年，情况是这样的：厂商们对骁龙有着娴熟的调教经验，再加上骁龙自身技术过硬，同时华为被制裁，高通那可真是迎来了发展的“春天”，小日子过得风生水起。不过呢，近些年，我们“玑哥”也慢慢崛起了。\n\t\n因为这两年联发科加大研发投入，改市场策略，同时靠终端厂商的推广等因素，现在天玑和骁龙这哥俩在市场上打得可畏是有来有回的，竞争相当激烈。\n\t\n说完这些芯片的渊源，咱再看看芯片性能排行榜。高通骁龙处理器里啊，8 开头的都是旗舰水平，7 开头的属于中端，以此类推，数字越小性能越差。天玑这边呢，情况类似，依次是天玑 9400 +、天玑 9400、天玑 9300 + 等等。华为处理器的排行榜呢，咱也单独列出来了，可以参考参考。\n\t\n码薯跟大家说一句：在如今这个时代，最新的手机芯片性能对咱们日常使用来说，那可真是过剩的。像华为、苹果这样的厂商，就算不靠芯片性能，凭借自家的操作系统，也能让你日常使用顺滑得像绸，一点不卡顿。不过呢，咱还是得提醒大家一句，买手机的时候“买新不买旧”这个原则还是很重要的，毕竟新手机用的时间更长嘛。\n\t\n最后，如果只依据处理器来给大家推荐手机，那可太片面了。以后，码薯会从使用场景、人群偏好、厂商偏好等方面，给大家推荐更适合自己、更性价比的手机。\n\t\n大家要是有啥问题，就赶紧趁着咱粉丝少，赶紧问我哦。", "liked_count": 207, "comment_count": 42, "share_count": 41, "collected_count": 67, "source_keyword": "华为和苹果性能对比", "create_time": "2025-05-17 16:17:28", "interaction": 357, "is_dual_holder": true, "tone_score": -5.5, "sentiment_v2": "其他", "extracted_models": []}, {"note_id": "68d2c1ed0000000011016772", "title": "目前手机的主流处理器，丝滑流畅", "content": "上至苹果最新款，下到华为旗舰机，没有一个是会卡的。\n性价比推荐看【天玑8400-MAX，天玑9300，A15, A16。没有溢价，性能还很给力", "liked_count": 65, "comment_count": 69, "share_count": 4, "collected_count": 10, "source_keyword": "华为和苹果性能对比", "create_time": "2025-09-23 23:51:09", "interaction": 148, "is_dual_holder": false, "tone_score": 1.0, "sentiment_v2": "其他", "extracted_models": []}, {"note_id": "6927bc4e000000001e024a5d", "title": "什么安卓都是配置没输过，体验上没赢过ios。\n是不是都卷错了方向", "content": "什么安卓都是配置没输过，体验上没赢过ios。\n是不是都卷错了方向", "liked_count": 4, "comment_count": 369, "share_count": 1, "collected_count": 5, "source_keyword": "华为和苹果性能对比", "create_time": "2025-11-27 10:49:51", "interaction": 379, "is_dual_holder": false, "tone_score": -1.0, "sentiment_v2": "其他", "extracted_models": []}, {"note_id": "6947fd4f000000001d03d2a8", "title": "华为🇨🇳VS苹果🍎", "content": "准备换手机到底选华为还是苹果不谈什么情怀哈真的只谈手机 从来没有用过华为 网上 function updateStats() {
  const total = TAGS_DATA.length;

  const lag = TAGS_DATA.filter(t => t.theme === '卡顿问题').length;
  const stable = TAGS_DATA.filter(t => t.theme === '稳定性').length;
  
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-smooth').textContent = smooth;
  document.getElementById('stat-lag').textContent = lag;
  document.getElementById('stat-stable').textContent = stable;
}

// 渲染列表

  // 按note_id分组
  const grouped = {};

    if (!grouped[tag.note_id]) grouped[tag.note_id] = [];
    grouped[tag.note_id].push(tag);
  });
  
  // 过滤
  let filteredNotes = Object.keys(grouped).filter(noteId => {
    const tags = grouped[noteId];
    const ugc = UGC_DATA.find(u => u.note_id === noteId);
    if (!ugc) return false;
    
    // 主题过滤
    if (currentFilters.theme !== 'all' && !tags.some(t => t.theme === currentFilters.theme)) return false;
    
    // 情感过滤
    if (currentFilters.sentiment !== 'all' && !tags.some(t => {
      const ugcItem = UGC_DATA.find(u => u.note_id === t.note_id);
      return ugcItem && ugcItem.sentiment_v2 === currentFilters.sentiment;
    })) return false;
    
    // 品牌过滤
    if (currentFilters.brand !== 'all' && !tags.some(t => t.brand_model && t.brand_model.includes(currentFilters.brand))) return false;
    
    // 双持过滤
    if (currentFilters.dual !== 'all') {
      const isDual = ugc.is_dual_holder;
      if (currentFilters.dual === 'true' && !isDual) return false;
      if (currentFilters.dual === 'false' && isDual) return false;
    }
    
    // 搜索过滤
    if (currentFilters.search) {
      const searchLower = currentFilters.search.toLowerCase();
      const titleMatch = ugc.title && ugc.title.toLowerCase().includes(searchLower);
      const contentMatch = ugc.content && ugc.content.toLowerCase().includes(searchLower);
      if (!titleMatch && !contentMatch) return false;
    }
    
    // 关键词筛选
    if (currentFilters.keyword) {
      const kwLower = currentFilters.keyword.toLowerCase();
      const titleMatch = ugc.title && ugc.title.toLowerCase().includes(kwLower);
      const contentMatch = ugc.content && ugc.content.toLowerCase().includes(kwLower);
      const modelMatch = ugc.extracted_models && ugc.extracted_models.some(m => m.toLowerCase().includes(kwLower));
      if (!titleMatch && !contentMatch && !modelMatch) return false;
    }
    
    return true;
  });
  
  // 按互动量排序
  filteredNotes.sort((a, b) => {
    const ugcA = UGC_DATA.find(u => u.note_id === a);
    const ugcB = UGC_DATA.find(u => u.note_id === b);
    return (ugcB?.interaction || 0) - (ugcA?.interaction || 0);
  });
  
  filteredNotes.forEach(noteId => {
    const tags = grouped[noteId];
    const ugc = UGC_DATA.find(u => u.note_id === noteId);
    if (!ugc) return;
    
    const card = document.createElement('div');
    card.className = 'ugc-card';
    card.dataset.noteId = noteId;
    
    // 机型标签
    const modelTagsHtml = ugc.extracted_models && ugc.extracted_models.length > 0 
      ? '<div class="model-tags">' + ugc.extracted_models.map(m => `<span class="model-tag">${m}</span>`).join('') + '</div>'
      : '';
    
    // 双持标记
    const dualBadge = ugc.is_dual_holder ? '<span class="dual-badge">双持</span>' : '';
    
    // 消费者口吻分数
    const toneBadge = `<span class="tone-score">口吻分: ${ugc.tone_score}</span>`;
    
    let tagsHtml = tags.map((tag, idx) => `
      <div class="tag-item theme-${tag.theme}">
        <div class="tag-header">
          <span class="tag-theme">${tag.theme}</span>
          <span class="tag-sentiment sentiment-${ugc.sentiment_v2}">${ugc.sentiment_v2}</span>
        </div>
        <div class="tag-quote">${escapeHtml(tag.quote)}</div>
        <div class="tag-brand">📱 ${tag.brand_model || '不明确'}</div>
        ${tag.reason ? `<div class="tag-reason">💡 ${escapeHtml(tag.reason)}</div>` : ''}
        <div style="margin-top: 8px;">
          <button class="reclassify-btn" onclick="toggleEdit('${noteId}', ${idx})">✏️ 重新分类</button>
        </div>
        <div class="edit-form" id="edit-${noteId}-${idx}">
          <select id="theme-${noteId}-${idx}">
            <option value="流畅丝滑" ${tag.theme==='流畅丝滑'?'selected':''}>流畅丝滑</option>
            <option value="卡顿问题" ${tag.theme==='卡顿问题'?'selected':''}>卡顿问题</option>
            <option value="稳定性" ${tag.theme==='稳定性'?'selected':''}>稳定性</option>
          </select>
          <select id="sentiment-${noteId}-${idx}">
            <option value="华为好" ${ugc.sentiment_v2==='华为好'?'selected':''}>华为好</option>
            <option value="苹果好" ${ugc.sentiment_v2==='苹果好'?'selected':''}>苹果好</option>
            <option value="其他" ${ugc.sentiment_v2==='其他'?'selected':''}>其他</option>
          </select>
          <input type="text" id="brand-${noteId}-${idx}" value="${tag.brand_model || ''}" placeholder="品牌+机型">
          <textarea id="quote-${noteId}-${idx}" placeholder="quote">${tag.quote || ''}</textarea>
          <button class="btn btn-primary" onclick="saveEdit('${noteId}', ${idx})">保存</button>
          <button class="btn btn-warning" onclick="toggleEdit('${noteId}', ${idx})">取消</button>
        </div>
        <div class="comment-box">
          <textarea id="comment-${noteId}-${idx}" placeholder="写下修改意见..." onblur="saveComment('${noteId}', ${idx})">${comments[`${noteId}-${idx}`] || ''}</textarea>
        </div>
      </div>
    `).join('');
    
    card.innerHTML = `
      <div class="ugc-header">
        <div>
          <div class="ugc-title">${escapeHtml(ugc.title)}${dualBadge}${toneBadge}</div>
          <div class="ugc-meta">
            <span>👍 ${ugc.liked_count}</span>
            <span>💬 ${ugc.comment_count}</span>
            <span>🔄 ${ugc.share_count}</span>
            <span>⭐ ${ugc.collected_count}</span>
            <span>📊 互动: ${ugc.interaction}</span>
            <span>📅 ${ugc.create_time}</span>
            <span>🔍 ${ugc.source_keyword}</span>
          </div>
          ${modelTagsHtml}
        </div>
      </div>
      <div class="ugc-body">
        <div class="ugc-content">${escapeHtml(ugc.content)}</div>
      </div>
      <div class="tags-section">${tagsHtml}</div>
    `;
    
    list.appendChild(card);
  });
}

function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function setupFilters() {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const filter = btn.dataset.filter;
      const value = btn.dataset.value;
      
      document.querySelectorAll(`.filter-btn[data-filter="${filter}"]`).forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      
      currentFilters[filter] = value;
      renderList();
    });
  });
  
  document.getElementById('searchInput').addEventListener('input', (e) => {
    currentFilters.search = e.target.value;
    renderList();
  });
  
  document.getElementById('keywordInput').addEventListener('input', (e) => {
    currentFilters.keyword = e.target.value;
    renderList();
  });
}

function toggleEdit(noteId, idx) {
  const form = document.getElementById(`edit-${noteId}-${idx}`);
  form.classList.toggle('active');
}

function saveEdit(noteId, idx) {
  const theme = document.getElementById(`theme-${noteId}-${idx}`).value;
  const sentiment = document.getElementById(`sentiment-${noteId}-${idx}`).value;
  const brand = document.getElementById(`brand-${noteId}-${idx}`).value;
  const quote = document.getElementById(`quote-${noteId}-${idx}`).value;
  
  const tag = TAGS_DATA.find(t => t.note_id === noteId && t.theme === theme);
  if (tag) {
    const oldValues = { ...tag };
    tag.theme = theme;
    tag.sentiment = sentiment;
    tag.brand_model = brand;
    tag.quote = quote;
    
    changes.push({
      note_id: noteId,
      title: UGC_DATA.find(u => u.note_id === noteId)?.title || '',
      old: oldValues,
      new: { theme, sentiment, brand_model: brand, quote },
      time: new Date().toISOString()
    });
    
    updateChangeCount();
    toggleEdit(noteId, idx);
    renderList();
  }
}

function saveComment(noteId, idx) {
  const comment = document.getElementById(`comment-${noteId}-${idx}`).value;
  if (comment.trim()) {
    comments[`${noteId}-${idx}`] = comment;
  } else {
    delete comments[`${noteId}-${idx}`];
  }
  updateChangeCount();
}

function updateChangeCount() {
  document.getElementById('changeCount').textContent = `已修改: ${changes.length} 条 | 修改意见: ${Object.keys(comments).length} 条`;
}

function showExport() {
  const area = document.getElementById('exportArea');
  const textarea = document.getElementById('exportTextarea');
  
  if (changes.length === 0) {
    textarea.value = '暂无修改记录';
  } else {
    textarea.value = JSON.stringify(changes, null, 2);
  }
  
  area.classList.toggle('active');
}

function showComments() {
  const area = document.getElementById('commentsArea');
  const textarea = document.getElementById('commentsTextarea');
  
  if (Object.keys(comments).length === 0) {
    textarea.value = '暂无修改意见';
  } else {
    const exportData = Object.entries(comments).map(([key, comment]) => {
      const [noteId, idx] = key.split('-');
      const ugc = UGC_DATA.find(u => u.note_id === noteId);
      return {
        note_id: noteId,
        title: ugc?.title || '',
        comment: comment,
        time: new Date().toISOString()
      };
    });
    textarea.value = JSON.stringify(exportData, null, 2);
  }
  
  area.classList.toggle('active');
}

function copyExport() {
  const textarea = document.getElementById('exportTextarea');
  textarea.select();
  document.execCommand('copy');
  alert('已复制到剪贴板！');
}

function copyComments() {
  const textarea = document.getElementById('commentsTextarea');
  textarea.select();
  document.execCommand('copy');
  alert('已复制到剪贴板！');
}

function saveAllChanges() {
  if (changes.length === 0 && Object.keys(comments).length === 0) {
    alert('没有修改需要保存');
    return;
  }
  
  const dataStr = JSON.stringify({ changes, comments }, null, 2);
  const blob = new Blob([dataStr], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `theme_tag_changes_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  
  alert(`已保存 ${changes.length} 条修改记录和 ${Object.keys(comments).length} 条修改意见`);
}

// 启动
init();
</script>
</body>
</html>
