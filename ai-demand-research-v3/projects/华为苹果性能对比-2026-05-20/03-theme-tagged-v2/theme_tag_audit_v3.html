搬iOS26的液态玻璃👍🏻，控制中心图标并没有像某些系统那么强的玻璃效果。\n-\n另外流畅度这一块ColorOS 16也很给力，动画丝滑得一比。\n即便是在负一屏和侧边栏这种安卓定制系统容易卡的地方，ColorOS 16也完全不卡~\n这个真不是我吹，有机会你们去体验下懂了！！\n-\n看之前说是机圈德芙本来以为是吹的，实际情况是oppo可能还过于谦虚了~哈哈\n这流畅度说是安卓最强也不为过，还有和ColorOS 16流畅度不相上下的还有鸿蒙OS，iOS26说实话用过ColorOS16后，感觉也就那么回事了。\n以上仅是我的个人观点哈~\n-\n还有就是细节功能上ColorOS 16做得也还行，AI人像补光，便签AI写作、AI实景对话这些实用性都很强。\n-\n反正让我选的话，在对比体验后会闭眼选ColorOS 16，首发机型是Find X9系列，10月16亮相，想抢先体验话，蹲Find X9完事~", "interaction": 0, "create_time": "2025-10-15 12:42:59", "is_dual": true, "tone_score": 0, "sentiment": "其他", "sentiment_reasoning": "内容主要推崇ColorOS 16，虽提到iOS和鸿蒙，但核心倾向是OPPO，非华为vs苹果的明确对比", "tags": [{"note_id": "68ef265300000000050116f9", "title": "四大系统同台PK，哪个设计好看？", "theme": "流畅丝滑", "quote": "另外流畅度这一块ColorOS 16也很给力，动画丝滑得一比，即便是在负一屏和侧边栏这种安卓定制系统容易卡的地方，ColorOS 16也完全不卡~，看之前说是机圈德芙本来以为是吹的，实际情况是oppo可能还过于谦虚了~哈哈。", "brand_model": "华为/苹果", "sentiment": "正面", "reason": ""}, {"note_id": "68ef265300000000050116f9", "title": "四大系统同台PK，哪个设计好看？", "theme": "卡顿问题", "quote": "即便是在负一屏和侧边栏这种安卓定制系统容易卡的地方，ColorOS 16也完全不卡~。", "brand_model": "华为/苹果", "sentiment": "正面", "reason": ""}], "matched_keywords": []}, {"note_id": "6932b88d000000001e0054b5", "title": "放以前不敢想，三大系统体验一目了然!", "content": "以前都是iOS丝滑程度领先，但近几年iOS、鸿蒙、ColorOS三大系统丝滑程度都是T0级别的了！下面就是鸿蒙6、iOS26以及ColorOS 16三大系统，流畅度的对比很明显了吧？\n\t\n这三都是T0级别的手机系统，动画效果都很到位了，只是部分细节有差异。像打断动画这种基础，这三家都做得很到位了。\n\t\n而灵动岛回收的动画，苹果和OPPO的会更圆润一些。小窗这块苹果还是画中画，华为OPPO是都已经支持多窗口了。全局搜索处的打断动画华为反应很快，OPPO则还能做到从哪来回哪去，苹果就稍微有点延迟了。\n\t\n实际差距很小的，今年搭载这三大系统的旗舰机型都挺值得入的。像华为Mate80 Pro，在鸿蒙6的加持下日常使用流畅体验有保障。iPhone 17 Pro配置全面升级后，iOS 26也更好发挥了。OPPO Find X9 Pro在ColorOS 16的加持下，已经成为安卓流畅的代表了，2亿像素、丹霞色彩还原镜头、7500mAh等配置也让它体验更全面。\n\t\n大家觉得，这三大系统哪个更强？你现在用的手机是什么系统呢？", "interaction": 0, "create_time": "2025-12-05 18:48:46", "is_dual": true, "tone_score": 0, "sentiment": "其他", "sentiment_reasoning": "用户认为iOS、鸿蒙、ColorOS三大系统流畅度都是T0级别，实际差距很小，属于中性客观对比", "tags": [{"note_id": "6932b88d000000001e0054b5", "title": "放以前不敢想，三大系统体验一目了然!", "theme": "流畅丝滑", "quote": "以前都是iOS丝滑程度领先，但近几年iOS、鸿蒙、ColorOS三大系统丝滑程度都是T0级别的了，下面就是 的实况图也这么卡吗", "brand_model": "华为Mate80ProMax", "sentiment": "负面", "reason": "用户表达华为Mate80PM实况图卡"}], "matched_keywords": []}, {"note_id": "6a0c6850000000000602186e", "title": "苹果对比华为真是输惨了", "content": "转华为后，可玩性比苹果高了不止一个Level，质感很好，到手像第一次用iPhone5s和iPhoneX 一样惊喜，爱不释手！鸿蒙流畅度很惊喜，跟苹果不相上下，就创新而言，确实遥遥领先了", "interaction": 0, "create_time": "2026-05-19 21:40:32", "is_dual": true, "tone_score": 0, "sentiment": "华为好", "sentiment_reasoning": "用户转华为后表示可玩性比苹果高，鸿蒙流畅度跟苹果不相上下，创新遥遥领先，明确倾向华为。", "tags": [{"note_id": "6a0c6850000000000602186e", "title": "苹果对比华为真是输惨了", "theme": "流畅丝滑", "quote": "鸿蒙流畅度很惊喜，跟苹果不相上下", "brand_model": "华为", "sentiment": "正面", "reason": "用户表达鸿蒙流畅度跟苹果不相上下"}], "matched_keywords": []}, {"note_id": "64c0db63000000000103c073", "title": "不同手机的保值率，iphone 12还能再战？", "content": "可能很多小伙伴更在意的不是手机保不保值，而是手机的使用寿命，其实使用寿命跟手机的保值率也是有关系的哦\n苹果和华为的保值率都还蛮高的，苹果属于怎么用都很流畅的，保值率高也不意外，华为由于麒麟芯片的缘故，mate40Pro属于越旧越香的类型，当然也不排除mate50系列真的很难抢到，有钱都买不到，哪还有贬值的道理\n说起贬值，那就不得不提到三星了，名副其实的跳水王者，如果说想要保值率高的手机，那就别考虑三星了，其次还有红米、真我、iQOO这些。\n有一说一，安卓阵营保值率再怎么高也无法撼动苹果手机保值率第一的地位！ #", "interaction": 0, "create_time": "2023-07-26 16:37:55", "is_dual": true, "tone_score": 0, "sentiment": "苹果好", "sentiment_reasoning": "用户明确表示苹果怎么用都很流畅，且强调安卓阵营保值率再高也无法撼动苹果保值率第一的地位，倾向苹果。", "tags": [{"note_id": "64c0db63000000000103c073", "title": "不同手机的保值率，iphone 12还能再战？", "theme": "流畅丝滑", "quote": "苹果属于怎么用都很流畅的", "brand_model": "苹果", "sentiment": "正面", "reason": "用户表达苹果怎么用都很流畅"}], "matched_keywords": []}, {"note_id": "65e31c35000000000b018f18", "title": "给娃入手matepadair，开始体验。", "content": "❤️今年过年时和朋友们聚餐，餐桌上几乎都是宝妈和奶爸，大家都是带着孩子来聚会的，平板电脑成为让孩子安静听话的神器，除了我家之外，几乎人手一个。\n❤️和朋友聊天知道了，如果孩子每天必须要对着电子屏幕看好一阵，手机真的不合适，尺寸太小，会让孩子视觉疲劳加重，进而影响视力。\n❤️所以这两天就在研究给孩子买个Pad玩，看了好几个产品，坠后定了华为的MatepadAir，其实ipad的体验感和稳定性都是坠好的，也坠喜欢，但是由于我们的需求以孩子为主，平时只是看动画片用，视频类居多，而ipad价格都太高，超预算太多，确实没必要，就选择了华为，也算是国货南玻万了。\n❤️Ipad9的价格倒是合适，但去了实体店真实体验后，真心感觉9已经是上个时代的产品了，有些脱节了，非全1面屏，单扬声器，60HZ屏幕，都不太符合我们的需求，苹果的AIR和PRO固然爽，质感没得挑，但看个动画片来说，这个价格确实是没必要。\n❤️然后就跑去了华为店，看了一圈，各种对比，坠后选择了matepadair，就一个理由，这款机器的屏幕好，144hz和2.8k，看着确实舒服，价格也合适，就果断入手了。\n❤️其实买国产平板还是有些担心的，怕的就是用个一两年以后就开始卡，犯安卓的老毛病，但看过网上很多评价后，觉得可以相信华为的产品力，而且我们的使用强度也达不到玩命榨取它的性能，所以赌它以后不会卡顿。\n❤️这篇笔记我准备当作长测笔记，长时间不断更新，和大家报告使用状况，大家有什么关于matepadair的问题也可以问我，我知道的都会回答。", "interaction": 0, "create_time": "2024-03-02 20:31:49", "is_dual": true, "tone_score": 0, "sentiment": "苹果好", "sentiment_reasoning": "用户明确表示iPad的体验感和稳定性都是最好的，虽然因预算选择华为，但内心更认可苹果。", "tags": [{"note_id": "65e31c35000000000b018f18", "title": "给娃入手matepadair，开始体验。", "theme": "稳定性", "quote": "ipad的体验感和稳定性都是坠好的", "brand_model": "苹果", "sentiment": "正面", "reason": "用户表达iPad体验感和稳定性最好"}], "matched_keywords": []}, {"note_id": "666bba59000000001c0232a1", "title": "你觉得差距在哪？", "content": "明明安卓手机的耐用性、功能性、拍照、流畅度都追上来很多了呀。", "interaction": 0, "create_time": "2024-06-14 11:34:49", "is_dual": false, "tone_score": 0, "sentiment": "其他", "sentiment_reasoning": "", "tags": [{"note_id": "666bba59000000001c0232a1", "title": "你觉得差距在哪？", "theme": "流畅丝滑", "quote": "明明安卓手机的耐用性、功能性、拍照、流畅度都追上来很多了呀", "brand_model": "不明确", "sentiment": "正面", "reason": "用户表达安卓流畅度追上来了"}], "matched_keywords": []}, {"note_id": "67dd5f2d000000000d01500a", "title": "不同品牌手机寿命大揭秘，谁才是耐用之王", "content": "宝子们在选手机时，除了性能、颜值，使用寿命也很关键！今天就给大家盘一盘各大品牌手机的耐用度👇\n📱苹果手机\n苹果手机的寿命普遍3年起步，保养得好甚至能用10年 。只要内存足够，就无需急着换新，像iPhone16系列，性能和系统都很能打。\n📱华为手机\n华为手机正常使用3 - 5年没问题，如果5G技术没有带来颠覆性的体验，现有的华为手机还能再战3 - 5年。推荐Mate70和P70系列，品质和性能都有保障。\n📱小米手机\n小米手机价格亲民还耐用，使用寿命大概3 - 5年，对于追求性价比的朋友来说，小米15系列是不错的选择。\n📱OPPO手机\nOPPO手机使用寿命约2年，由于系统优化方面存在短板，使用时间长了容易卡顿，推荐Reno系列和Find系列 。\n📱vivo手机\nvivo手机更新换代速度快，寿命在2 - 3年。vivo一年发布两次新机，iQOO一年发布三次。vivoX系列和iQOO系列值得入手。\n📱三星手机\n三星手机的使用寿命比较迷，有人觉得不耐用，也有人认为只要多包容，它就能一直陪伴。作为“演唱会神器”，S系列值得关注。\n大家的手机都用了多久呢？欢迎在评论区分享~", "interaction": 0, "create_time": "2025-03-21 20:44:29", "is_dual": true, "tone_score": 0, "sentiment": "其他", "sentiment_reasoning": "内容是对多个品牌手机寿命的客观盘点，虽然提到苹果能用10年、华为3-5年，但整体是信息整理，没有明确倾向华为或苹果谁更好。", "tags": [{"note_id": "67dd5f2d000000000d01500a", "title": "不同品牌手机寿命大揭秘，谁才是耐用之王", "theme": "流畅丝滑", "quote": "苹果手机的寿命普遍3年起步，保养得好甚至能用10年 。只要内存足够，就无需急着换 var modifiedNotes = {};
var currentFiltered = [];

function renderCards(data) {
  currentFiltered = data;
  var container = document.getElementById('ugcList');
  var noResults = document.getElementById('noResults');
  
  if (data.length === 0) {
    container.innerHTML = '';
    noResults.classList.remove('hidden');
    return;
  }
  noResults.classList.add('hidden');
  
  var html = '';
  for (var i = 0; i < data.length; i++) {
    var u = data[i];
    var sentimentClass = u.sentiment === '华为好' ? 'badge-huawei' : (u.sentiment === '苹果好' ? 'badge-apple' : 'badge-other');
    var dualBadge = u.is_dual ? '<span class="badge badge-dual">双持</span>' : '';
    var tagsHtml = '';
    for (var j = 0; j < u.tags.length; j++) {
      var t = u.tags[j];
      tagsHtml += '<div class="tag-item">';
      tagsHtml += '<div class="tag-header"><span class="tag-theme">🎯 ' + t.theme + '</span></div>';
      tagsHtml += '<div class="tag-quote">"' + escapeHtml(t.quote) + '"</div>';
      tagsHtml += '<div class="tag-brand">📱 品牌/机型: ' + (t.brand_model || '未标注') + '</div>';
      tagsHtml += '</div>';
    }
    
    var mod = modifiedNotes[u.note_id] || {};
    var currentSentiment = mod.sentiment || u.sentiment;
    var huaweiActive = currentSentiment === '华为好' ? 'active' : '';
    var appleActive = currentSentiment === '苹果好' ? 'active' : '';
    var otherActive = currentSentiment === '其他' ? 'active' : '';
    var feedbackVal = mod.feedback || '';
    
    html += '<div class="card" data-note-id="' + u.note_id + '">';
    html += '<div class="card-header">';
    html += '<div class="card-title">' + escapeHtml(u.title) + '</div>';
    html += '<div class="card-meta">';
    html += '<span>👍 ' + u.interaction + '</span>';
    html += '<span>📅 ' + u.create_time + '</span>';
    html += '<span class="badge ' + sentimentClass + '">' + u.sentiment + '</span>';
    html += dualBadge;
    html += '<span style="color:#fa8c16;">💬 口吻:' + u.tone_score + '</span>';
    html += '</div></div>';
    html += '<div class="card-content">' + escapeHtml(u.content) + '</div>';
    html += '<div class="tags-section">' + tagsHtml + '</div>';
    html += '<div style="font-size:12px;color:#888;margin-bottom:8px;">🤖 LLM判断依据: ' + escapeHtml(u.sentiment_reasoning) + '</div>';
    html += '<div class="reclassify-section">';
    html += '<label>重新分类情感倾向:</label>';
    html += '<div class="reclassify-btns">';
    html += '<button class="btn btn-danger sentiment-btn ' + huaweiActive + '" data-note-id="' + u.note_id + '" data-sentiment="华为好">华为好</button>';
    html += '<button class="btn btn-primary sentiment-btn ' + appleActive + '" data-note-id="' + u.note_id + '" data-sentiment="苹果好">苹果好</button>';
    html += '<button class="btn sentiment-btn ' + otherActive + '" style="background:#999;color:white;" data-note-id="' + u.note_id + '" data-sentiment="其他">其他</button>';
    html += '</div>';
    html += '<input type="text" class="feedback-input" placeholder="修改意见（可选）..." value="' + escapeHtml(feedbackVal) + '" data-note-id="' + u.note_id + '">';
    html += '</div>';
    html += '</div>';
  }
  container.innerHTML = html;
  updateStats(data);
}

function escapeHtml(text) {
  if (!text) return '';
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function updateStats(data) {
  var total = ugcData.length;
  var showing = data.length;
  var huawei = 0, apple = 0, other = 0;
  for (var i = 0; i < data.length; i++) {
    var mod = modifiedNotes[data[i].note_id];
    var s = mod && mod.sentiment ? mod.sentiment : data[i].sentiment;
    if (s === '华为好') huawei++;
    else if (s === '苹果好') apple++;
    else other++;
  }
  document.getElementById('statsBar').innerHTML = 
    '总计: ' + total + '条 | 当前显示: ' + showing + '条 | 华为好: ' + huawei + ' | 苹果好: ' + apple + ' | 其他: ' + other;
}

function applyFilters() {
  var theme = document.getElementById('themeFilter').value;
  var sentiment = document.getElementById('sentimentFilter').value;
  var dual = document.getElementById('dualFilter').value;
  var keyword = document.getElementById('keywordFilter').value.toLowerCase();
  var sortBy = document.getElementById('sortBy').value;
  
  var filtered = [];
  for (var i = 0; i < ugcData.length; i++) {
    var u = ugcData[i];
    
    if (theme !== 'all') {
      var hasTheme = false;
      for (var j = 0; j < u.tags.length; j++) {
        if (u.tags[j].theme === theme) { hasTheme = true; break; }
      }
      if (!hasTheme) continue;
    }
    
    if (sentiment !== 'all') {
      var mod = modifiedNotes[u.note_id];
      var currentSentiment = mod && mod.sentiment ? mod.sentiment : u.sentiment;
      if (currentSentiment !== sentiment) continue;
    }
    
    if (dual !== 'all') {
      var isDual = u.is_dual ? 'true' : 'false';
      if (isDual !== dual) continue;
    }
    
    if (keyword) {
      var text = (u.title + ' ' + u.content).toLowerCase();
      if (text.indexOf(keyword) === -1) continue;
    }
    
    filtered.push(u);
  }
  
  if (sortBy === 'interaction') {
    filtered.sort(function(a, b) { return b.interaction - a.interaction; });
  } else if (sortBy === 'time') {
    filtered.sort(function(a, b) { return b.create_time.localeCompare(a.create_time); });
  } else if (sortBy === 'tone') {
    filtered.sort(function(a, b) { return b.tone_score - a.tone_score; });
  }
  
  renderCards(filtered);
}

function setSentiment(noteId, sentiment) {
  if (!modifiedNotes[noteId]) modifiedNotes[noteId] = {};
  modifiedNotes[noteId].sentiment = sentiment;
  applyFilters();
}

function setFeedback(noteId, feedback) {
  if (!modifiedNotes[noteId]) modifiedNotes[noteId] = {};
  modifiedNotes[noteId].feedback = feedback;
}

function resetFilters() {
  document.getElementById('themeFilter').value = 'all';
  document.getElementById('sentimentFilter').value = 'all';
  document.getElementById('dualFilter').value = 'all';
  document.getElementById('keywordFilter').value = '';
  document.getElementById('sortBy').value = 'interaction';
  applyFilters();
}

function showModal(title, content) {
  document.getElementById('modalTitle').innerText = title;
  document.getElementById('modalTextarea').value = content;
  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}

function copyModalContent() {
  var textarea = document.getElementById('modalTextarea');
  textarea.select();
  document.execCommand('copy');
  alert('已复制到剪贴板！');
}

function exportAllFeedback() {
  var lines = [];
  for (var noteId in modifiedNotes) {
    var mod = modifiedNotes[noteId];
    if (mod.feedback && mod.feedback.trim()) {
      var u = null;
      for (var i = 0; i < ugcData.length; i++) {
        if (ugcData[i].note_id === noteId) { u = ugcData[i]; break; }
      }
      if (u) {
        lines.push('---');
        lines.push('笔记ID: ' + noteId);
        lines.push('标题: ' + u.title);
        lines.push('原情感: ' + u.sentiment);
        lines.push('修改后: ' + (mod.sentiment || u.sentiment));
        lines.push('修改意见: ' + mod.feedback);
        lines.push('');
      }
    }
  }
  
  if (lines.length === 0) {
    showModal('导出修改意见', '暂无修改意见。请在UGC卡片下方的输入框中填写修改意见后再导出。');
  } else {
    showModal('导出修改意见 (' + (lines.length / 6) + '条)', lines.join('\n'));
  }
}

function exportModified() {
  var lines = [];
  for (var noteId in modifiedNotes) {
    var mod = modifiedNotes[noteId];
    var u = null;
    for (var i = 0; i < ugcData.length; i++) {
      if (ugcData[i].note_id === noteId) { u = ugcData[i]; break; }
    }
    if (!u) continue;
    
    var hasChange = (mod.sentiment && mod.sentiment !== u.sentiment) || (mod.feedback && mod.feedback.trim());
    if (hasChange) {
      lines.push('---');
      lines.push('笔记ID: ' + noteId);
      lines.push('标题: ' + u.title);
      lines.push('内容: ' + u.content.substring(0, 200) + (u.content.length > 200 ? '...' : ''));
      lines.push('原情感: ' + u.sentiment);
      if (mod.sentiment) lines.push('新情感: ' + mod.sentiment);
      if (mod.feedback) lines.push('修改意见: ' + mod.feedback);
      lines.push('');
    }
  }
  
  if (lines.length === 0) {
    showModal('导出修改过的UGC', '暂无修改过的UGC。请先点击重新分类按钮或填写修改意见。');
  } else {
    showModal('导出修改过的UGC (' + (lines.length / 7) + '条)', lines.join('\n'));
  }
}

});
