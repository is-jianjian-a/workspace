        function updateStats() {
            var high = 0, medium = 0, low = 0;
            UGC_DATA.forEach(function(u) {

            });
            document.getElementById('count-high').textContent = high;
            document.getElementById('count-medium').textContent = medium;
            document.getElementById('count-low').textContent = low;
            document.getElementById('count-all').textContent = UGC_DATA.length;
        }
        
        function getFilteredData() {

                });

            }

                html += '<div class="structured-item"><span class="label">情绪:</span><span class="value">' + escapeHtml(s.emotion || '无') + ' (' + (s.emotion_intensity || '中') + ')</span></div>';
                html += '</div>';
                
                html += '<div class="ugc-footer" style="display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid #f0f0f0;margin-top:12px">';
                html += '<div class="ugc-stats" style="display:flex;gap:15px;font-size:12px;color:#888">';
                html += '<span>👍 ' + (item.liked_count || 0) + '</span>';
                html += '<span>⭐ ' + (item.collected_count || 0) + '</span>';
                html += '<span>💬 ' + (item.comment_count || 0) + '</span>';
                html += '</div>';
                html += '<div class="ugc-actions">';
                html += '<button onclick="showFeedback(' + originalIndex + ')">📝 写意见</button>';
                html += '</div></div>';
                
                if (hasFeedback) {
                    html += '<div class="feedback-section" style="margin-top:12px;padding:12px;background:#fefce8;border-radius:8px;border-left:4px solid #eab308">';
                    html += '<h4 style="font-size:13px;color:#854d0e;margin-bottom:8px">📝 您的意见</h4>';
                    html += '<p style="font-size:13px;color:#555">' + escapeHtml(feedbackData[originalIndex]) + '</p>';
                    html += '</div>';
                }
                
                html += '</div>';
            });
            
            container.innerHTML = html;
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function toggleExpand(btn) {
            var textDiv = btn.parentElement;
            textDiv.classList.toggle('expanded');
            btn.textContent = textDiv.classList.contains('expanded') ? '收起' : '展开';
        }
        
        function showFeedback(index) {
            var card = document.querySelectorAll('.ugc-card')[index];
            var feedbackSection = card.querySelector('.feedback-section');
            
            if (feedbackSection) {
                feedbackSection.remove();
                return;
            }
            
            feedbackSection = document.createElement('div');
            feedbackSection.className = 'feedback-section';
            feedbackSection.style.cssText = 'margin-top:12px;padding:12px;background:#fefce8;border-radius:8px;border-left:4px solid #eab308';
            feedbackSection.innerHTML = '<h4 style="font-size:13px;color:#854d0e;margin-bottom:8px">📝 写下您的意见</h4>' +
                '<textarea class="feedback-input" id="feedback-input-' + index + '" rows="3" placeholder="对这条结构化分析有什么意见？" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:13px;margin-bottom:8px">' + (feedbackData[index] || '') + '</textarea>' +
                '<div style="display:flex;gap:8px">' +
                '<button onclick="saveFeedback(' + index + ')" style="padding:6px 14px;border:none;border-radius:6px;cursor:pointer;font-size:12px;background:#22c55e;color:white">💾 保存</button>' +
                '<button onclick="clearFeedback(' + index + ')" style="padding:6px 14px;border:none;border-radius:6px;cursor:pointer;font-size:12px;background:#ef4444;color:white">🗑️ 清除</button>' +
                '</div>';
            card.appendChild(feedbackSection);
        }
        
        function saveFeedback(index) {
            var feedback = document.getElementById('feedback-input-' + index).value.trim();
            if (!feedback) {
                alert('请输入意见内容');
                return;
            }
            feedbackData[index] = feedback;
            document.getElementById('feedback-count').textContent = Object.keys(feedbackData).length;
            renderContent();
            alert('意见已保存！');
        }
        
        function clearFeedback(index) {
            delete feedbackData[index];
            document.getElementById('feedback-count').textContent = Object.keys(feedbackData).length;
            renderContent();
        }
        
        function applyFilters() {
            currentEmotion = document.getElementById('emotion-filter').value;
            currentKeyword = document.getElementById('keyword-filter').value;
            searchQuery = document.getElementById('search-text').value.trim();
            renderContent();
        }
        
        function resetFilters() {
            currentEmotion = 'all';
            currentKeyword = 'all';
            searchQuery = '';
            document.getElementById('emotion-filter').value = 'all';
            document.getElementById('keyword-filter').value = 'all';
            document.getElementById('search-text').value = '';
            renderContent();
        }
        
        function exportWithFeedback() {
            var keys = Object.keys(feedbackData);
            if (keys.length === 0) {
                alert('还没有任何意见');
                return;
            }
            var feedbackList = keys.map(function(k) {
                return {
                    note_id: UGC_DATA[k].note_id,
                    title: UGC_DATA[k].title,
                    structured: UGC_DATA[k].structured,
                    feedback: feedbackData[k]
                };
            });
            var dataStr = JSON.stringify(feedbackList, null, 2);
            navigator.clipboard.writeText(dataStr).then(function() {
                alert('已复制到剪贴板！');
            });
        }
        
        init();
    </script>
</body>
</html>
